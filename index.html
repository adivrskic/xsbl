        <h1>xsbl — Make Your Web Accessible</h1>
        <p>
          xsbl is an AI-powered web accessibility scanner that checks your
          website against WCAG 2.2 AA and AAA criteria. Scan your rendered pages
          in a real browser, get detailed issue breakdowns, and receive
          AI-generated code fix suggestions specific to your markup.
        </p>
        <h2>Features</h2>
        <p>
          Full-page rendering in a real Chromium browser. 90+ rules covering
          WCAG 2.2 AA and AAA: contrast, alt text, ARIA, keyboard navigation,
          forms, headings, and landmarks. AI fix suggestions with contextual
          code snippets. Continuous monitoring with daily or weekly scheduled
          scans. Accessibility score tracking over time with per-page breakdown.
          AI-generated alt text for images. Slack and email alerts. GitHub pull
          request integration for one-click fixes. PDF compliance reports, VPAT
          generation, audit logs, and SOC 2 / ISO evidence export.
        </p>
        <h2>Why Not Overlays?</h2>
        <p>
          Accessibility overlays inject JavaScript and only detect about 30% of
          WCAG issues. They break screen readers and assistive technology.
          Courts reject overlays as compliance evidence, and the FTC fined the
          market leader $1M for misleading claims. xsbl scans your actual code
          and provides real fixes.
        </p>
        <h2>How It Works</h2>
        <p>
          1. Enter your URL — we scan the rendered page in a real browser. No
          install needed. 2. See every issue — violations organized by severity
          and WCAG criterion. 3. Get fix suggestions — AI-generated code fixes
          specific to your markup.
        </p>
